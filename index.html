<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Space Dodger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <script type="module" src="game.js"></script>
</body>
</html>
<div id="gameContainer" style="position: relative; width: 400px; height: 600px;">
    <canvas id="gameCanvas" width="400" height="600" style="background: #000; position: absolute; top: 0; left: 0; z-index: 1;"></canvas>
    
    <div id="mainMenu" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); font-family: 'Courier New', monospace; color: white; z-index: 2;">
        <h1 style="color: #00ffcc; margin-bottom: 40px; font-size: 28px;">SPACE ESCAPE</h1>
        <button onclick="startGame('level')" style="padding: 10px 20px; margin: 10px; background: #00ffcc; border: none; font-family: 'Courier New'; font-weight: bold; cursor: pointer; width: 200px;">LEVEL MODE</button>
        <button onclick="startGame('endless')" style="padding: 10px 20px; margin: 10px; background: #ff5555; border: none; font-family: 'Courier New'; font-weight: bold; cursor: pointer; width: 200px; color: white;">ENDLESS MODE</button>
    </div>
</div>
