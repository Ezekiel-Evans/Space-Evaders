<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Space Dodger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="gameContainer" style="position: relative; width: 400px; height: 600px; margin: 0 auto;">
        
        <canvas id="gameCanvas" width="400" height="600" style="background: #000; position: absolute; top: 0; left: 0; z-index: 1;"></canvas>
        
        <div id="mainMenu" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); font-family: 'Courier New', monospace; color: white; z-index: 2;">
            <h1 style="color: #00ffcc; margin-bottom: 20px; font-size: 28px;">SPACE ESCAPE</h1>
            
            <button id="levelBtn" style="padding: 10px 20px; margin: 5px; background: #00ffcc; border: none; font-family: 'Courier New'; font-weight: bold; cursor: pointer; width: 200px;">LEVEL MODE</button>
            <button id="endlessBtn" style="padding: 10px 20px; margin: 5px; background: #ff5555; border: none; font-family: 'Courier New'; font-weight: bold; cursor: pointer; width: 200px; color: white;">ENDLESS MODE</button>
            
            <div style="margin-top: 20px; text-align: center; width: 90%; display: flex; justify-content: space-between; gap: 10px;">
                <div style="width: 50%;">
                    <h3 style="color: #00ffcc; font-size: 12px; margin-bottom: 5px;">TOP LEVELS</h3>
                    <div id="menuLevelLeaderboard" style="font-size: 11px; line-height: 1.4; color: #aaa;">Loading...</div>
                </div>
                <div style="width: 50%;">
                    <h3 style="color: #ffcc00; font-size: 12px; margin-bottom: 5px;">TOP DISTANCE</h3>
                    <div id="menuLeaderboard" style="font-size: 11px; line-height: 1.4; color: #aaa;">Loading...</div>
                </div>
            </div>
        </div>

        <div id="gameOverMenu" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(20, 0, 0, 0.9); font-family: 'Courier New', monospace; color: white; z-index: 3;">
            <h1 id="gameOverTitle" style="color: #ff5555; margin-bottom: 10px; font-size: 32px;">GAME OVER</h1>
            <p id="gameOverScore" style="font-size: 18px; margin-bottom: 5px; color: #fff;">Score: 0m</p>
            <p id="gameOverHighScore" style="font-size: 16px; margin-bottom: 15px; color: #ffcc00; display: none;">High Score: 0m</p>
            
            <div style="margin-bottom: 20px; text-align: center; width: 90%; display: flex; justify-content: space-between; gap: 10px;">
                <div style="width: 50%;">
                    <h3 style="color: #00ffcc; font-size: 12px; margin-bottom: 5px;">TOP LEVELS</h3>
                    <div id="gameOverLevelLeaderboard" style="font-size: 11px; line-height: 1.4; color: #aaa;">Loading...</div>
                </div>
                <div style="width: 50%;">
                    <h3 style="color: #ffcc00; font-size: 12px; margin-bottom: 5px;">TOP DISTANCE</h3>
                    <div id="gameOverLeaderboard" style="font-size: 11px; line-height: 1.4; color: #aaa;">Loading...</div>
                </div>
            </div>

            <button id="tryAgainBtn" style="padding: 10px 20px; margin: 5px; background: #00ffcc; border: none; font-family: 'Courier New'; font-weight: bold; cursor: pointer; width: 200px;">TRY AGAIN</button>
            <button id="campaignEndlessBtn" style="padding: 10px 20px; margin: 5px; background: #ff5555; border: none; font-family: 'Courier New'; font-weight: bold; cursor: pointer; width: 200px; color: white; display: none;">ENDLESS LEVELS</button>
            <button id="goToMenuBtn" style="padding: 10px 20px; margin: 5px; background: #888; border: none; font-family: 'Courier New'; font-weight: bold; cursor: pointer; width: 200px; color: white;">MAIN MENU</button>
        </div>
        
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
